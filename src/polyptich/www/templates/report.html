<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ manifest.title }}</title>
  <link href="https://unpkg.com/tabulator-tables@6.3.1/dist/css/tabulator.min.css" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static_files', filename='polyptich-www.css') }}">
</head>
<body>
  <div class="report-shell">
    <aside class="toc">
      <a class="back-link" href="{{ url_for('browse') }}">www</a>
      <nav id="toc"></nav>
    </aside>
    <main class="report">
      <header class="report-header">
        <ol class="breadcrumbs">
          {% for crumb in breadcrumbs %}
            <li>{% if not loop.first %}/{% endif %}<a href="{{ url_for('browse', subpath=crumb.path) }}">{{ crumb.label }}</a></li>
          {% endfor %}
        </ol>
        <h1>{{ manifest.title }}</h1>
        {% if manifest.description %}<p class="subtitle">{{ manifest.description }}</p>{% endif %}
      </header>
      <div id="report-root"></div>
    </main>
  </div>
  <script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
  <script src="https://unpkg.com/tabulator-tables@6.3.1/dist/js/tabulator.min.js"></script>
  <script id="polyptich-manifest" type="application/json">{{ manifest | tojson }}</script>
  <script>
    window.POLYPTICH_REPORT_PATH = {{ report_path | tojson }};
    window.POLYPTICH_URLS = {
      fileBase: {{ url_for('download', filename=report_path + '/') | tojson }},
      dataBase: {{ url_for('report_data', subpath=report_path, component_id='__ID__') | replace('__ID__', '') | tojson }},
      downloadBase: {{ url_for('report_download', subpath=report_path, component_id='__ID__') | replace('__ID__.xlsx', '') | tojson }}
    };
  </script>
  <script src="{{ url_for('static_files', filename='polyptich-www.js') }}"></script>
</body>
</html>
